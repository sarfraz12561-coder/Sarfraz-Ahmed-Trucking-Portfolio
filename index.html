<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sarfraz Ahmed — Heavy Truck Driver</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#0b1a2e;--navy2:#0f2135;--teal:#00b4c8;--teal2:#00d4e8;
  --white:#ffffff;--offwhite:#e8f0f7;--grey:#8a9bb0;--light:#c5d5e8;
  --card:#122033;--border:#1e3350;
  --font-h:'Oswald',sans-serif;--font-b:'Open Sans',sans-serif;
}
html{scroll-behavior:smooth;}
body{background:var(--navy);color:var(--white);font-family:var(--font-b);overflow-x:hidden;}

/* NAVBAR */
#navbar{
  position:fixed;top:0;left:0;right:0;z-index:999;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 48px;height:68px;
  background:rgba(11,26,46,0.96);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}
.nav-logo{font-family:var(--font-h);font-size:22px;font-weight:700;letter-spacing:3px;color:var(--white);text-transform:uppercase;}
.nav-logo span{color:var(--teal);}
.nav-links{display:flex;align-items:center;gap:4px;}
.nav-links a{
  padding:8px 18px;font-size:12px;font-weight:600;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--grey);text-decoration:none;
  border-bottom:2px solid transparent;transition:all .2s;
}
.nav-links a:hover,.nav-links a.active{color:var(--white);border-bottom-color:var(--teal);}
.nav-links a.nav-cta{
  background:var(--teal);color:var(--navy);border:none;
  padding:8px 20px;border-radius:3px;margin-left:12px;
}
.nav-links a.nav-cta:hover{background:var(--teal2);}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px;}
.hamburger span{width:24px;height:2px;background:var(--white);display:block;}

/* HERO */
#hero{
  position:relative;min-height:100vh;
  display:flex;align-items:center;overflow:hidden;padding-top:68px;
}
.hero-bg-img{
  position:absolute;inset:0;width:100%;height:100%;
  background:linear-gradient(135deg,#061222 0%,#0d2444 40%,#071828 100%);
  z-index:0;
}
.hero-bg-img::after{display:none;}
.hero-overlay{
  position:absolute;inset:0;z-index:1;
  background:linear-gradient(to right,rgba(11,26,46,.95) 45%,rgba(11,26,46,.2) 100%),
             linear-gradient(to top,rgba(11,26,46,.8) 0%,transparent 60%);
}
.hero-content{
  position:relative;z-index:2;padding:0 48px;max-width:660px;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:10px;
  background:rgba(0,180,200,.15);border:1px solid rgba(0,180,200,.4);
  padding:7px 16px;border-radius:3px;
  font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);
  font-weight:700;margin-bottom:28px;
}
.dot-pulse{width:8px;height:8px;background:var(--teal);border-radius:50%;animation:dp 2s infinite;}
@keyframes dp{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.4);}}
.hero-name{
  font-family:var(--font-h);font-size:min(11vw,96px);
  font-weight:700;line-height:.92;text-transform:uppercase;letter-spacing:1px;color:var(--white);
}
.hero-name .teal{color:var(--teal);display:block;}
.hero-role{
  font-family:var(--font-h);font-size:clamp(15px,2vw,20px);
  color:var(--grey);letter-spacing:3px;text-transform:uppercase;margin:16px 0 22px;
}
.hero-line{width:56px;height:3px;background:var(--teal);margin-bottom:26px;}
.hero-desc{font-size:15px;line-height:1.82;color:var(--light);max-width:500px;}
.hero-btns{display:flex;gap:14px;margin-top:36px;flex-wrap:wrap;}
.btn-p{
  padding:14px 32px;background:var(--teal);color:var(--navy);
  font-family:var(--font-h);font-weight:700;font-size:13px;letter-spacing:2px;
  text-transform:uppercase;border:none;cursor:pointer;border-radius:3px;
  transition:all .2s;text-decoration:none;display:inline-block;
}
.btn-p:hover{background:var(--teal2);transform:translateY(-2px);}
.btn-o{
  padding:14px 32px;background:transparent;color:var(--white);
  font-family:var(--font-h);font-weight:700;font-size:13px;letter-spacing:2px;
  text-transform:uppercase;border:2px solid rgba(255,255,255,.25);
  cursor:pointer;border-radius:3px;transition:all .2s;text-decoration:none;display:inline-block;
}
.btn-o:hover{border-color:var(--teal);color:var(--teal);}
.hero-statsbar{
  position:absolute;bottom:0;left:0;right:0;z-index:2;
  background:rgba(0,180,200,.1);border-top:1px solid rgba(0,180,200,.2);
  backdrop-filter:blur(8px);display:flex;
}
.hs{flex:1;padding:18px 28px;border-right:1px solid rgba(0,180,200,.15);display:flex;align-items:center;gap:14px;}
.hs:last-child{border-right:none;}
.hs-num{font-family:var(--font-h);font-size:26px;font-weight:700;color:var(--teal);line-height:1;}
.hs-lbl{font-size:10px;color:var(--grey);letter-spacing:1px;text-transform:uppercase;margin-top:3px;}

/* SECTION */
section{padding:80px 48px;}
.eyebrow{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--teal);font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:14px;}
.eyebrow::before{content:'';width:40px;height:2px;background:var(--teal);}
.sec-h{font-family:var(--font-h);font-size:clamp(32px,5vw,52px);font-weight:700;color:var(--white);text-transform:uppercase;letter-spacing:2px;margin-bottom:48px;line-height:1;}
.sec-h span{color:var(--teal);}

/* ABOUT */
#about{background:var(--navy2);border-top:1px solid var(--border);}
.about-grid{display:grid;grid-template-columns:1fr 1.6fr;gap:60px;align-items:start;}
.photo-wrap{position:relative;}
.photo-box{
  width:100%;aspect-ratio:3/4;background:var(--card);border:1px solid var(--border);
  border-radius:4px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;color:var(--grey);font-size:13px;text-align:center;
  padding:20px;overflow:hidden;
}
.photo-box img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:4px;}
.photo-badge{
  position:absolute;bottom:-14px;right:-14px;
  background:var(--teal);color:var(--navy);
  padding:11px 18px;font-family:var(--font-h);font-weight:700;
  font-size:12px;letter-spacing:2px;text-transform:uppercase;border-radius:4px;z-index:2;
}
.about-p{font-size:15px;line-height:1.85;color:var(--light);margin-bottom:16px;}
.skills-wrap{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px;}
.skill{
  padding:7px 16px;background:rgba(0,180,200,.1);
  border:1px solid rgba(0,180,200,.3);color:var(--teal);
  font-size:12px;letter-spacing:1px;border-radius:3px;font-weight:700;
}

/* CARDS */
#experience{background:var(--navy);border-top:1px solid var(--border);}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;}
.card{
  background:var(--card);border:1px solid var(--border);border-radius:6px;
  padding:32px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;
}
.card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--teal);transform:scaleX(0);transform-origin:left;transition:.3s;
}
.card:hover{border-color:var(--teal);transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,180,200,.12);}
.card:hover::after{transform:scaleX(1);}
.c-ico{font-size:36px;margin-bottom:18px;display:block;}
.c-title{font-family:var(--font-h);font-size:21px;font-weight:600;color:var(--white);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.c-desc{font-size:13px;color:var(--grey);line-height:1.7;}
.c-link{display:inline-flex;align-items:center;gap:6px;margin-top:20px;font-size:12px;color:var(--teal);letter-spacing:1px;text-transform:uppercase;font-weight:700;}
.c-link span{transition:transform .2s;}
.card:hover .c-link span{transform:translateX(4px);}

/* GALLERY */
#gallery{background:var(--navy2);border-top:1px solid var(--border);}
.gtabs{display:flex;gap:0;margin-bottom:36px;border:1px solid var(--border);border-radius:4px;overflow:hidden;width:fit-content;}
.gtab{
  padding:11px 28px;background:transparent;color:var(--grey);
  font-family:var(--font-h);font-size:13px;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;cursor:pointer;border:none;transition:all .2s;
}
.gtab.active{background:var(--teal);color:var(--navy);}
.gtab:hover:not(.active){color:var(--white);background:rgba(255,255,255,.05);}
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.gitem{
  aspect-ratio:4/3;background:var(--card);border:1px solid var(--border);
  border-radius:6px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:8px;cursor:pointer;transition:all .25s;overflow:hidden;
}
.gitem:hover{border-color:var(--teal);box-shadow:0 8px 24px rgba(0,180,200,.1);}
.gi{font-size:32px;}.gl{font-size:11px;color:#3a5a7a;letter-spacing:1px;}

/* CV */
#cv-sec{background:var(--navy);border-top:1px solid var(--border);}
.cv-box{
  max-width:540px;margin:0 auto;text-align:center;
  background:var(--card);border:1px solid var(--border);border-radius:8px;padding:52px 44px;
}
.cv-box h3{font-family:var(--font-h);font-size:28px;font-weight:700;color:var(--white);text-transform:uppercase;letter-spacing:2px;margin:18px 0 10px;}
.cv-box p{font-size:14px;color:var(--grey);line-height:1.7;margin-bottom:30px;}
.cv-dl{
  display:inline-flex;align-items:center;gap:10px;
  padding:15px 36px;background:var(--teal);color:var(--navy);
  font-family:var(--font-h);font-weight:700;font-size:14px;letter-spacing:2px;
  text-transform:uppercase;border:none;border-radius:4px;cursor:pointer;
  text-decoration:none;transition:all .2s;
}
.cv-dl:hover{background:var(--teal2);transform:translateY(-2px);}

/* CONTACT */
#contact{background:var(--navy2);border-top:1px solid var(--border);}
.cgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;max-width:800px;}
.cc{
  background:var(--card);border:1px solid var(--border);border-radius:6px;
  padding:28px;display:flex;align-items:flex-start;gap:18px;transition:border-color .2s;
}
.cc:hover{border-color:var(--teal);}
.cc-ico{
  width:48px;height:48px;background:rgba(0,180,200,.12);
  border:1px solid rgba(0,180,200,.25);border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;
}
.cc-lbl{font-size:10px;color:var(--grey);text-transform:uppercase;letter-spacing:2px;margin-bottom:5px;}
.cc-val{font-size:14px;color:var(--white);font-weight:600;}

/* MODALS */
.overlay{
  position:fixed;inset:0;background:rgba(5,12,22,.9);z-index:3000;
  display:none;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(6px);
}
.overlay.open{display:flex;}
.modal{
  background:var(--navy2);border:1px solid var(--border);border-radius:10px;
  max-width:660px;width:100%;max-height:88vh;overflow-y:auto;padding:44px;position:relative;
}
.mcls{
  position:absolute;top:16px;right:20px;background:none;border:none;
  color:var(--grey);font-size:22px;cursor:pointer;transition:color .2s;
}
.mcls:hover{color:var(--white);}
.modal h2{font-family:var(--font-h);font-size:34px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:2px;margin-bottom:28px;}
.mbody{font-size:14px;line-height:1.85;color:var(--light);}
.mbody h3{font-family:var(--font-h);font-size:16px;color:var(--white);text-transform:uppercase;letter-spacing:2px;margin:22px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.mbody ul{padding-left:20px;}.mbody li{margin-bottom:8px;}
.badge{
  display:inline-block;padding:4px 12px;
  background:rgba(0,180,200,.12);border:1px solid rgba(0,180,200,.3);
  color:var(--teal);font-size:11px;border-radius:3px;margin:4px;letter-spacing:1px;font-weight:700;
}
.xp{border-left:3px solid var(--teal);padding-left:22px;margin-bottom:28px;}
.xp .co{font-weight:700;color:var(--white);font-size:16px;}
.xp .yr{font-size:12px;color:var(--teal);letter-spacing:1px;margin:4px 0 10px;}

/* FOOTER */
footer{
  background:var(--navy);border-top:1px solid var(--border);
  padding:22px 48px;display:flex;justify-content:space-between;
  align-items:center;font-size:12px;color:#3a5a7a;
}

/* MOBILE */
@media(max-width:768px){
  #navbar{padding:0 20px;}
  .nav-links{display:none;flex-direction:column;position:absolute;top:68px;left:0;right:0;background:var(--navy2);border-bottom:1px solid var(--border);padding:16px 20px;gap:4px;}
  .nav-links.open{display:flex;}
  .nav-links a{border-bottom:none;}
  .hamburger{display:flex;}
  #hero,section{padding:80px 20px 60px;}
  .hero-content{padding:0 20px;}
  .hero-statsbar{flex-wrap:wrap;}
  .hs{min-width:50%;border-right:none;border-bottom:1px solid rgba(0,180,200,.15);}
  .about-grid{grid-template-columns:1fr;}
  .cards,.cgrid{grid-template-columns:1fr;}
  .modal{padding:28px 20px;}
  footer{flex-direction:column;gap:8px;text-align:center;}
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav id="navbar">
  <div class="nav-logo">Sarfraz <span>Ahmed</span></div>
  <div class="nav-links" id="navLinks">
    <a href="#hero" class="active">Home</a>
    <a href="#about">About</a>
    <a href="#experience">Experience</a>
    <a href="#gallery">Gallery</a>
    <a href="#cv-sec">CV</a>
    <a href="#contact" class="nav-cta">Contact</a>
  </div>
  <button class="hamburger" id="ham" onclick="toggleNav()">
    <span></span><span></span><span></span>
  </button>
</nav>
